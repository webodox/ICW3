
<!DOCTYPE HTML>
<html>
   <head>
      <title>I Love NY T-Shirt</title>
      <style>

         .container {
            position: relative;      
            width: 450px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f0f0;   
            text-align: center;
         }

         img {
            position: relative;
            left: 10px;               
            z-index: 1;

            width: 350px;             
            height: auto;             

            display: block;
            margin: 20px auto;                      
            box-shadow: 8px 8px 18px rgba(0, 0, 0, 0.45); 
         }

         .words {
            font-family: impact;
            font-size: 60px;
         }

         .first {
            position: absolute;
            top: 185px;
            left: 220px;
            z-index: 2;
         }

         .heart {
            color: red;
            font-size: 80px;
            position: absolute;
            top: 175px;
            right: 197px;
            z-index: 2;
         }

         .last {
            position: absolute;
            top: 250px;
            left: 220px;
            z-index: 2;
         }

      </style>
   </head>
   <body>

      <div class="container">

         <span class="first words">I</span>
         <span class="heart">&hearts;</span>
         <span class="last words">NY</span>

         <div>
            <img src="images/whitetee.webp" alt="White t-shirt">
         </div>

      </div>

   </body>
</html>
